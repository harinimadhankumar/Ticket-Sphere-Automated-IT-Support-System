# ============================================================
# IT TICKET MANAGEMENT SYSTEM - APPLICATION CONFIGURATION
# Phase 1: Unified Ticket Ingestion
# ============================================================

# ------------------------------------------------------------
# APPLICATION INFO
# ------------------------------------------------------------
spring.application.name=IT-Ticket-Management-System

# ------------------------------------------------------------
# SERVER 

# ------------------------------------------------------------
server.port=8080

# ------------------------------------------------------------
# MYSQL DATABASE CONFIGURATION
# Single source of truth for all tickets
# ------------------------------------------------------------
# UPDATE THESE VALUES WITH YOUR MYSQL CONNECTION DETAILS:
spring.datasource.url=jdbc:mysql://localhost:3306/powergrid_tickets?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Dhinakaran@1845
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# EMAIL INGESTION CONFIGURATION (IMAP) - GMAIL SETUP
# Used by Email Ingestion Connector to poll it-support inbox
# ------------------------------------------------------------
mail.imap.host=imap.gmail.com
mail.imap.port=993
mail.imap.username=harinimadhan2005@gmail.com
mail.imap.password=pikx uykk xxkj xcau
mail.imap.protocol=imaps

# Enable/disable email polling
# Set to TRUE after configuring real Gmail credentials above
mail.ingestion.enabled=true

# Maximum emails to process per polling cycle (prevents memory issues)
mail.ingestion.maxEmailsPerPoll=10

# Subject keyword filter - ONLY process emails with these keywords in subject
# Comma-separated list. Leave empty to process all emails.
# Example: ticket,support,help,issue,problem,error,not working
mail.ingestion.subjectKeywords=ticket,support,help,issue,problem,error,not working,urgent,request,vpn,password,wifi,locked,crash,ci,deployment,pipeline,artifact,checksum,signature,validation,speaker

# ------------------------------------------------------------
# PHASE 4: SELF-SERVICE RESOLUTION CONFIGURATION
# ------------------------------------------------------------

# Enable/disable self-service resolution globally
selfservice.enabled=true

# Skip self-service for CRITICAL priority tickets (send directly to engineer)
selfservice.skip.critical=true

# Skip self-service for HIGH priority tickets (optional, default false)
selfservice.skip.high=false

# Minimum confidence score for self-service (0.0 to 1.0)
# Tickets with classification confidence below this threshold skip self-service
selfservice.confidence.threshold=0.6

# Enable email delivery for solutions
selfservice.email.enabled=true

# Timeout (in hours) to wait for user response before escalating
selfservice.response.timeout.hours=24

# Hours before timeout to send reminder email (e.g., 12 hours before escalation)
selfservice.response.reminder.hours=12

# Self-Service Timeout Scheduler Configuration
# Enable/disable timeout scheduler that checks for unresponded KB solutions
selfservice.timeout.enabled=true

# Interval between timeout checks (in milliseconds)
# 300000 = 5 minutes (checks for timeouts every 5 minutes)
selfservice.timeout.interval=300000

# Initial delay before first timeout check (in milliseconds)
# 30000 = 30 seconds (gives time for app to fully start)
selfservice.timeout.initial-delay=30000

# ------------------------------------------------------------
# SPRING MAIL CONFIGURATION (for sending solution emails)
# ------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=harinimadhan2005@gmail.com
spring.mail.password=pikx uykk xxkj xcau
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ------------------------------------------------------------
# SCHEDULER CONFIGURATION
# Email polling interval (in milliseconds)
# 60000 = 1 minute (for testing)
# 300000 = 5 minutes (for production)
# ------------------------------------------------------------
email.polling.interval=30000

# Enable Spring Scheduling
spring.task.scheduling.pool.size=2

# ------------------------------------------------------------
# LOGGING CONFIGURATION
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.powergrid=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file configuration
logging.file.name=logs/it-ticket-system.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ============================================================
# PHASE 5: SLA MONITORING & AUTO ESCALATION CONFIGURATION
# ============================================================

# ------------------------------------------------------------
# SLA MONITORING SCHEDULER
# ------------------------------------------------------------
# Enable/disable SLA monitoring
sla.monitoring.enabled=true

# Interval between SLA checks (in milliseconds)
# 600000 = 10 minutes (production)
# 60000 = 1 minute (for testing)
sla.monitoring.interval=600000

# Initial delay before first SLA check (in milliseconds)
# 60000 = 1 minute (gives time for app to fully start)
sla.monitoring.initial-delay=60000

# Log detailed information for each ticket check
sla.monitoring.log-details=true

# Cron expression for daily summary report (8:00 AM every day)
sla.monitoring.daily-summary-cron=0 0 8 * * ?

# ------------------------------------------------------------
# SLA NOTIFICATION CONFIGURATION
# ------------------------------------------------------------
# Enable/disable SLA breach notifications
sla.notification.enabled=true

# From email address for SLA notifications
sla.notification.from=harinimadhan2005@gmail.com

# Admin email for Level 3 escalations
sla.notification.admin=harinipriya3108@gmail.com

# Team lead email for Level 1 escalations
sla.notification.teamlead=harinim23cse@srishakthi.ac.in

# Manager email for Level 2 escalations
sla.notification.manager=harinim23cse@srishakthi.ac.in

# ------------------------------------------------------------
# SLA TIMES (in hours) - Can override SlaConfiguration defaults
